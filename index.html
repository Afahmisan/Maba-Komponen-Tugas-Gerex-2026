<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Profil Maba</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="profile-card">
        <!-- Banner gradient decoratif -->
        <div class="card-banner"></div>
        
        <div class="card-content">
            <!-- Avatar section -->
            <div class="avatar-container">
                <img class="avatar" 
                     src="foto.jpeg" 
                     alt="Foto Profil Asfia Fahmisan">
            </div>
            

            <h2 class="profile-name">Asfia Fahmisan</h2>
            <p class="profile-dept">Teknologi Informasi</p>
            
            
            <div class="info-grid">
                <div class="info-box">
                    <p class="info-label">NRP</p>
                    <p class="info-value">5027251043</p>
                </div>
                <div class="info-box">
                    <p class="info-label">Gugus</p>
                    <p class="info-value">Gugus 7</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
